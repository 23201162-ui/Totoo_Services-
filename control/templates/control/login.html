<!DOCTYPE html>
<html>
<head>
    <title>Control Login</title>
</head>
<body>

<h2>Control Panel Login</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username"><br><br>
    <input type="password" name="password" placeholder="Password"><br><br>
    <input type="text" name="role" placeholder="Role (admin/developer)"><br><br>
    <input type="text" name="role_id" placeholder="Role ID"><br><br>

    <button type="submit">Login</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

</body>
</html>
